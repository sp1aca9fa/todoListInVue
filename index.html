<!DOCTYPE html>
<html>
<head>
  <title>🗒 Todo List</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="shortcut icon" href="data:image/x-icon;" type="image/x-icon">
  <!-- bootstrap and fontawesome -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.1.2/css/all.css">

  <!-- imported libraries go here -->
  <script type="importmap">
    {
      "imports": {
        "vue": "https://unpkg.com/vue@3/dist/vue.esm-browser.js"
      }
    }
  </script>
</head>
<body class="bg-light">
  <div class="row justify-content-center mt-4">
    <div class="col-lg-4 bg-white rounded shadow-sm p-5">
     <h1 class="mb-3">🗒 My Todo List in Vue</h1>
     <div id="todosContainer" v-cloak>

       <!-- Your code goes here -->
        <form class="d-flex mb-3">
          <input type="text" class="form-control" id="newtodo" placeholder="Add a new to do" v-model="newTodo">
          <button type="submit" class="btn btn-primary" v-on:click.prevent="addTodo">Add</button>
        </form>
        <div class="shadow-sm rounded px-4 py-3 mb-2 border d-flex" v-for="todo in todos">
          <input class="form-check-input me-1" type="checkbox" v-bind:checked="todo.done" >
          <div class="d-flex flex-fill">{{ todo.title }}<a href="#" class="ms-auto btn-close" aria-label="Delete" v-on:click.prevent="deleteTodo(todo.title)"></a></div>
        </div>

     </div>
   </div>
  </div>
  <!-- Import your own javascript -->
  <script src="lib/to-do-list.js" type="module"></script>
</body>
</html>
